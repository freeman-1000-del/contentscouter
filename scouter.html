<style>
  :root{
    --bg:#0d0f14; --panel:#161922; --panel2:#1e222d; --line:#2a2f3c;
    --txt:#eef1f6; --sub:#aeb6c4; --hint:#6b7385;
    --accent:#ff5436; --accent2:#ffb454; --accent3:#4ea1ff;
    --good:#46d39a;
    --page-gray:#505050;
    --side-rail:240px;

    --layout-offset-x:4px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background:var(--page-gray);overflow-x:hidden}
  body{
    background:var(--page-gray); color:var(--txt);
    font-family:"Pretendard","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.5; padding:16px 0 48px; width:100%; margin:0;
    overflow-x:hidden;
  }
  .scouterShell{
    width:100%;
    max-width:100%;
    margin:0 auto;
    background:var(--bg);
    border:2px solid #1e2433;
    border-radius:12px;
    padding:24px 28px 60px;
    box-shadow:0 8px 40px rgba(0,0,0,.45);
    overflow-x:hidden;
    box-sizing:border-box;
  }
  @media(max-width:960px){
    .scouterShell{margin:0 12px;width:auto;padding:20px 16px 48px}
  }
  .eyebrow{display:none}
  h1{font-size:38px; font-weight:800; letter-spacing:-.02em; margin:8px 0 6px; line-height:1.15;}
  .lead{color:var(--sub); font-size:14px;}
  .lead .upd{color:var(--hint); font-size:12px; margin-left:6px;}

  /* View buttons */
  .tabs{display:grid; grid-template-columns:repeat(9,1fr); gap:9px; margin:24px 0 8px;}
  .tab{
    background:var(--panel); border:1.5px solid var(--line); border-radius:14px;
    padding:13px 12px; cursor:pointer; transition:.15s; text-align:left;
  }
  .tab:hover{border-color:#3a4150; transform:translateY(-1px);}
  .tab.on{border-color:var(--accent); background:var(--panel2);}
  .tab .dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:7px;}
  /* Reuse Allowed (CC) — highlight the killer feature */
  .tab.kill{border-color:#7ee787; background:linear-gradient(145deg,#16302a,var(--panel)); box-shadow:0 0 0 1px rgba(126,231,135,.25), 0 4px 16px rgba(126,231,135,.12);}
  .tab.kill .t{color:#7ee787;}
  .tab.kill:hover{border-color:#7ee787; box-shadow:0 0 0 1px rgba(126,231,135,.4), 0 6px 20px rgba(126,231,135,.2);}
  .tab.kill.on{border-color:#7ee787; background:linear-gradient(145deg,#1c3d34,var(--panel2));}
  .tab .t{font-size:15px; font-weight:700; color:var(--accent2);}
  .tab .d{font-size:12px; color:var(--hint); margin-top:4px;}

  /* Sub-selection (country/category/continent chips) */
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 4px; min-height:0;}
  .chip{
    background:var(--panel); border:1px solid var(--line); border-radius:20px;
    padding:7px 14px; font-size:13px; color:var(--sub); cursor:pointer; transition:.12s;
  }
  .chip:hover{border-color:#3a4150; color:var(--txt);}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;}

  .sectitle{font-size:19px; font-weight:800; color:var(--accent2); margin:24px 0 14px; display:flex; align-items:center; gap:10px;}
  .sectitle::before{content:""; width:4px; height:18px; background:var(--accent2); border-radius:3px; display:inline-block;}
  .sectitle .count{font-size:12px; color:var(--hint); font-weight:600;}

  /* Video grid */

  .cardArticle{min-width:0}
  .card{min-width:0}
  @media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr);} .tabs{grid-template-columns:repeat(3,1fr);}}

    background:var(--panel); border:1px solid var(--line); border-radius:12px;

  .catnote{width:100%; margin-top:10px; padding:11px 15px; font-size:12.5px; color:var(--hint); background:var(--panel); border:1px solid var(--line); border-radius:10px; line-height:1.5;}

  .cctally{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:20px;}

  .cccount{display:flex; align-items:center; gap:8px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:8px 14px;}
  .cccount-name{font-size:13px; color:var(--txt);}
  .cccount-num{font-size:14px; font-weight:800; color:#7ee787;}
  .cccount.zero{opacity:.45;}
  .cccount.zero .cccount-num{color:var(--hint);}
  .spin{display:inline-block; width:22px; height:22px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp .8s linear infinite; margin-bottom:12px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .cardArticle{display:flex;flex-direction:column}
  .cardArticle .card{border-radius:14px 14px 0 0}
  .videoReactions{
    font-size:12px;line-height:1.55;color:var(--hint);
    padding:10px 12px 13px;margin:0;
    background:var(--panel);border:1px solid var(--line);border-top:0;
    border-radius:0 0 14px 14px;
    word-break:break-word;overflow-wrap:anywhere;

  .videoReactions .videoDesc{color:var(--sub);margin:0 0 10px;font-size:12px;line-height:1.5}
  .videoReactions .reactionsTitle{font-size:11px;font-weight:700;color:var(--accent2);margin:0 0 6px;text-transform:uppercase;letter-spacing:.04em}
  .commentList{margin:0;padding:0;list-style:none}
  .commentList li{margin:0 0 8px;padding:8px 10px;background:var(--panel2);border-radius:8px;border:1px solid var(--line)}
  .commentList li strong{color:var(--txt);font-size:12px}
  .commentList .commentText{display:block;margin-top:4px;color:var(--sub)}
  .commentList .commentLikes{font-size:11px;color:var(--hint);margin-top:3px}
  .reactionsLoading,.reactionsEmpty{margin:0;font-size:12px;color:var(--hint)}
  .viewIntro{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;margin-bottom:18px;font-size:14px;line-height:1.65;color:var(--sub);
  }
  .viewIntroTitle{font-size:17px;font-weight:800;color:var(--accent2);margin:0 0 10px}
  .viewIntro p{margin:0 0 10px}
  .viewIntro p:last-child{margin-bottom:0}
  .trendsPanel{
    background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;margin-bottom:18px;font-size:13px;line-height:1.6;color:var(--sub);
  }
  .trendsPanel h3{margin:0 0 8px;font-size:15px;color:#5ad1c8}
  .trendsPanel ul{margin:8px 0;padding-left:20px}
  .trendsPanel li{margin:5px 0}
  .trendsNote{font-size:11px;color:var(--hint);margin:10px 0 0}
  .textCatalog{
    margin-top:28px;padding:20px;border:1px solid var(--line);border-radius:14px;
    background:var(--panel);font-size:13px;line-height:1.6;color:var(--sub);
  }
  .textCatalog h3{font-size:16px;color:var(--accent2);margin:0 0 10px}
  .textCatalog ol{margin:12px 0 0;padding-left:22px}
  .textCatalog li{margin:0 0 12px}
</style>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ===== Config: fill in the two lines below with your own values =====
// ===== The key settings are in HUMATECK_CONFIG at the top of this file's <head> =====
const SUPABASE_URL = window.HUMATECK_CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.HUMATECK_CONFIG.SUPABASE_ANON_KEY;
// ====================================================

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const COUNTRY_NAMES = {
  US:"United States", CA:"Canada", MX:"Mexico", GB:"United Kingdom", DE:"Germany", FR:"France",
  ES:"Spain", IT:"Italy", RU:"Russia", JP:"Japan", KR:"South Korea", IN:"India",
  ID:"Indonesia", VN:"Vietnam", BR:"Brazil", AU:"Australia"
};
const CONTINENTS = {
  namerica:"North America", europe:"Europe", asia:"Asia", samerica:"South America", oceania:"Oceania"
};
const CATEGORIES = {
  music:"Music", comedy:"Comedy", animals:"Animals", howto:"How-to & Style",
  people:"People & Blogs", education:"Education", ent:"Entertainment", film:"Film & Animation",
  sports:"Sports", news:"News & Politics", science:"Science & Technology", gaming:"Gaming",
  travel:"Travel & Events", autos:"Autos & Vehicles"
};

let latestSnapshot = null;
let state = { view:'global', country:'US', category:'music', continent:'asia', risingPeriod:1, keywordMode:'popular', ccCategory:'comedy', ccMode:'popular' };
let ccSnapshotsCache = null;

const $ = (s)=>document.querySelector(s);
const fmtViews = (n)=>{ n=Number(n)||0;
  if(n>=1e9) return (n/1e9).toFixed(1)+"B"; if(n>=1e6) return (n/1e6).toFixed(1)+"M"; if(n>=1e3) return (n/1e3).toFixed(1)+"K"; return ""+n; };
const agoText = (iso)=>{ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return "";
  const days=Math.floor((Date.now()-d.getTime())/86400000);
  if(days<=0) return "Today"; if(days<7) return days+"d ago";
  if(days<30) return Math.floor(days/7)+"w ago"; if(days<365) return Math.floor(days/30)+"mo ago";
  return Math.floor(days/365)+"y ago"; };

// Find the latest collection snapshot
async function loadLatestSnapshot(){
  const { data, error } = await sb.from('scout_snapshots')
    .select('*').eq('kind','popular').order('collected_at',{ascending:false}).limit(1);
  if(error || !data || !data.length) return null;
  return data[0];
}

// Fetch videos (based on the latest snapshot)
async function loadVideos(filter){
  if(!latestSnapshot) return [];

  // Category view: if the same video spans multiple categories, show it only in the one it's ranked highest in
  if(filter.category_key){
    return await loadCategoryVideos(filter.category_key, filter.limit||50);
  }

  let q = sb.from('scout_videos').select('*').eq('snapshot_id', latestSnapshot.id);
  if(filter.country_code) q = q.eq('country_code', filter.country_code).eq('category_key','all');
  if(filter.continent)    q = q.eq('continent', filter.continent).eq('category_key','all');
  // For views that need deduplication, fetch a generous pool of candidates first, then trim
  const fetchLimit = filter.dedupe ? 800 : (filter.limit||100);
  q = q.order('view_count',{ascending:false}).limit(fetchLimit);
  const { data, error } = await q;
  if(error){ console.error(error); return []; }
  if(filter.dedupe){
    const seen=new Set(); return (data||[]).filter(v=>{ if(seen.has(v.video_id)) return false; seen.add(v.video_id); return true; });
  }
  return data||[];
}

// Category view: if the same video spans multiple categories, use the category where it has the highest rank as its representative
let categoryOwnerCache = { snapshotId:null, owner:null };

async function buildCategoryOwners(){
  if(categoryOwnerCache.snapshotId === latestSnapshot.id) return categoryOwnerCache.owner;
  // Exclude 'all'; fetch (video, category, rank) for every category row
  const { data } = await sb.from('scout_videos')
    .select('video_id,category_key,rank')
    .eq('snapshot_id', latestSnapshot.id)
    .neq('category_key','all');
  // For each video, use the category with the "highest rank (lower number = higher rank)" as its representative
  const best = {}; // video_id -> {cat, rank}
  (data||[]).forEach(r=>{
    const cur = best[r.video_id];
    if(!cur || r.rank < cur.rank){ best[r.video_id] = { cat:r.category_key, rank:r.rank }; }
  });
  const owner = {};
  Object.entries(best).forEach(([vid,info])=>{ owner[vid] = info.cat; });
  categoryOwnerCache = { snapshotId:latestSnapshot.id, owner };
  return owner;
}

async function loadCategoryVideos(categoryKey, limit){
  const owner = await buildCategoryOwners();
  const { data, error } = await sb.from('scout_videos').select('*')
    .eq('snapshot_id', latestSnapshot.id).eq('category_key', categoryKey)
    .order('view_count',{ascending:false}).limit(800);
  if(error){ console.error(error); return []; }
  const seen=new Set(); const out=[];
  for(const v of (data||[])){
    if(seen.has(v.video_id)) continue;                          // Remove duplicate videos
    if(owner[v.video_id] && owner[v.video_id]!==categoryKey) continue; // Skip if not the representative category
    seen.add(v.video_id); out.push(v);
    if(out.length>=limit) break;
  }
  return out;
}

function cardHTML(v, i){
  const country = v.country_code && v.country_code!=='GLOBAL' ? (COUNTRY_NAMES[v.country_code]||v.country_code) : '';
  const ago = agoText(v.published_at);
  return `<a class="card" href="${v.youtube_url}" target="_blank" rel="noopener">
    <div class="thumb">
      <div class="rankbadge">${i+1}</div>
      ${v.country_code && v.country_code!=='GLOBAL' ? `<div class="ccountry">${v.country_code}</div>`:''}
      <img src="${v.thumbnail_url}" loading="lazy" alt="${escapeHtml(v.title||'YouTube video')}">
    </div>
    <div class="cbody">
      <div class="ctitle">${escapeHtml(v.title)}</div>
      <div class="cmeta">
        <span class="views">${fmtViews(v.view_count)} views</span>
        ${v.like_count?`<span>· 👍${fmtViews(v.like_count)}</span>`:''}
        ${country?`<span>· ${country}</span>`:''}
        ${ago?`<span>· ${ago}</span>`:''}
      </div>
      <div class="cmeta"><span class="cchan">${escapeHtml(v.channel||'')}</span></div>
    </div>
  </a>`;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const fmtNum = (n)=> Number(n||0).toLocaleString('en-US');

function videoReactionsShell(v){
  const id = escapeHtml(v.video_id || '');
  if(!id) return '';
  return `<div class="videoReactions" data-video-id="${id}"><p class="reactionsLoading">Loading audience reactions…</p></div>`;
}

function renderReactionsHTML(data){
  if(!data || !data.ok){
    const msg = data?.error === 'YouTube API not configured'
      ? 'Live comments will appear after YouTube API is connected.'
      : (data?.error || 'Comments unavailable for this video.');
    return `<p class="reactionsEmpty">${escapeHtml(msg)}</p>`;
  }
  let html = '';
  if(data.description){
    html += `<p class="videoDesc">${escapeHtml(data.description)}</p>`;
  }
  if(data.comments && data.comments.length){
    html += `<p class="reactionsTitle">Top comments</p><ul class="commentList">`;
    html += data.comments.map(c=>`
      <li><strong>${escapeHtml(c.author)}</strong>

const reactionsCache = new Map();
let reactionsInflight = 0;
const REACTIONS_MAX_PARALLEL = 4;

async function fetchVideoReactions(videoId){
  if(reactionsCache.has(videoId)) return reactionsCache.get(videoId);
  const url = window.HUMATECK_CONFIG.VIDEO_REACTIONS_URL
    || `${window.HUMATECK_CONFIG.SUPABASE_URL}/functions/v1/video-reactions`;
  while(reactionsInflight >= REACTIONS_MAX_PARALLEL){
    await new Promise(r=>setTimeout(r, 120));
  }
  reactionsInflight++;
  try{
    const res = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey': SUPABASE_ANON_KEY
      },
      body:JSON.stringify({ videoId }), cache:'no-store'
    });
    const data = await res.json();
    reactionsCache.set(videoId, data);
    return data;
  }catch(e){
    return { ok:false, error:'Could not load reactions' };
  }finally{
    reactionsInflight--;
  }
}

function bindVideoReactions(root){
  if(!root) return;
  const boxes = root.querySelectorAll('.videoReactions[data-video-id]');
  if(!boxes.length) return;
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting) return;
      const el = entry.target;
      observer.unobserve(el);
      const videoId = el.dataset.videoId;
      if(!videoId || el.dataset.loaded) return;
      el.dataset.loaded = '1';
      fetchVideoReactions(videoId).then(data=>{
        el.innerHTML = renderReactionsHTML(data);
      });
    });
  }, { rootMargin:'120px' });
  boxes.forEach(el=>observer.observe(el));
}

  const box = $('#chips');

      `<button class="chip ${state.country===code?'on':''}" data-type="country" data-val="${code}">${name}</button>`).join('');
  } else if(state.view==='category'){

    // This applies to education and travel/events. → Hide them from chips to avoid a confusing "no videos" state.
    // (travel does return results in CC search, so it's still used as-is in the CC tab)
    const CATEGORY_UNSUPPORTED = ['education','travel'];
    box.innerHTML = Object.entries(CATEGORIES)
      .filter(([key])=> !CATEGORY_UNSUPPORTED.includes(key))
      .map(([key,name])=>
      `<button class="chip ${state.category===key?'on':''}" data-type="category" data-val="${key}">${name}</button>`).join('')
      + `<div class="catnote">※ 'Education' and 'Travel & Events' aren't shown because YouTube doesn't provide a per-country trending chart for these categories.</div>`;
  } else if(state.view==='continent'){
    box.innerHTML = Object.entries(CONTINENTS).map(([key,name])=>
      `<button class="chip ${state.continent===key?'on':''}" data-type="continent" data-val="${key}">${name}</button>`).join('');
  } else if(state.view==='rising'){
    // For monthly, once 30 days of data have accumulated, re-enable the [30,'Monthly'] line (currently hidden)
    const periods = [[1,'Daily'],[7,'Weekly']];
    box.innerHTML = periods.map(([d,name])=>
      `<button class="chip ${state.risingPeriod===d?'on':''}" data-type="rising" data-val="${d}">${name}</button>`).join('');
  } else if(state.view==='keyword'){

    box.innerHTML = modes.map(([m,name])=>
      `<button class="chip ${state.keywordMode===m?'on':''}" data-type="keyword" data-val="${m}">${name}</button>`).join('');
  } else if(state.view==='cc'){
    const modes = [['popular','Popular'],['reaction','Top Engagement'],['surge','Rising']];
    box.innerHTML = modes.map(([m,name])=>
      `<button class="chip ${state.ccMode===m?'on':''}" data-type="cc" data-val="${m}">${name}</button>`).join('');
  } else {

    renderChips(); render();
  }));
}

// Rising: compares the latest snapshot with the snapshot closest to N days ago, ranked by view-count increase
async function loadRising(periodDays){
  // Fetch enough snapshots, newest first
  const { data: snaps } = await sb.from('scout_snapshots')
    .select('*').eq('kind','popular').order('collected_at',{ascending:false}).limit(40);
  if(!snaps || snaps.length < 2){
    return { notReady:true, reason:'firstrun' };
  }
  const cur = snaps[0];
  const curTime = new Date(cur.collected_at).getTime();
  const targetTime = curTime - periodDays*86400000;

  // Find the 'previous' snapshot closest to the target time (N days ago)
  let prev = null, bestGap = Infinity;
  for(let i=1;i<snaps.length;i++){
    const t = new Date(snaps[i].collected_at).getTime();
    if(t > curTime) continue;
    const gap = Math.abs(t - targetTime);
    if(gap < bestGap){ bestGap = gap; prev = snaps[i]; }
  }
  // If the comparison snapshot hasn't even reached half the target period, treat it as "not enough data yet"
  const spanDays = prev ? (curTime - new Date(prev.collected_at).getTime())/86400000 : 0;
  if(!prev || spanDays < periodDays*0.5){
    return { notReady:true, reason:'notenough', haveDays: Math.round(spanDays), needDays: periodDays };
  }

  const { data: curV } = await sb.from('scout_videos').select('video_id,title,channel,thumbnail_url,view_count,like_count,comment_count,published_at,country_code,youtube_url')
    .eq('snapshot_id', cur.id).eq('category_key','all').neq('country_code','GLOBAL');
  const { data: prevV } = await sb.from('scout_videos').select('video_id,view_count')
    .eq('snapshot_id', prev.id).eq('category_key','all').neq('country_code','GLOBAL');

  const prevMap = {};
  (prevV||[]).forEach(v=>{ if(prevMap[v.video_id]==null || v.view_count>prevMap[v.video_id]) prevMap[v.video_id]=v.view_count; });

  const best = {};
  (curV||[]).forEach(v=>{
    const before = prevMap[v.video_id];
    if(before==null) return;
    const delta = (v.view_count||0) - before;
    if(!best[v.video_id] || v.view_count>best[v.video_id].view_count){
      best[v.video_id] = {...v, delta};
    }
  });
  const rows = Object.values(best).filter(v=>v.delta>0).sort((a,b)=>b.delta-a.delta).slice(0,60);
  return { notReady:false, rows, spanDays:Math.round(spanDays) };
}

// ===== Keyword Trends =====
// Words to filter out (stopwords): meaningless common/boilerplate words (multilingual)
const STOPWORDS = new Set([
  // Common English
  "the","a","an","of","to","in","on","for","and","or","with","by","at","from","is","are","be","my","your","you","i","it","we","this","that","new","official","video","mv","feat","ft","full","hd","4k","vs","x","ep","part","season","live","audio","lyrics","lyric","music","song","remix","cover","trailer","teaser","show","tv","ver","version","prod",
  // Common Korean
  "그리고","그런데","하지만","그래서","오늘","영상","공식","뮤직","노래","최신","현재","우리","너무","정말","진짜","이것","그것","feat",
  // Symbols/numeric
  "|","-","–","—","ft.","feat.","x","&","·",
  // Common Japanese/other boilerplate words
  "公式","ミュージック","ビデオ","최初","オフィシャル"
]);

// Split a title into words (Korean/English/Japanese/numeric, 2+ characters)
function tokenize(title){
  if(!title) return [];
  // Include content inside parentheses/brackets; treat special characters as spaces
  const cleaned = title.toLowerCase()
    .replace(/[\[\]\(\)\{\}|.,!?:;"'`~@#$%^&*+=<>/\\]/g," ")
    .replace(/[-–—_]/g," ");
  const raw = cleaned.split(/\s+/).filter(Boolean);
  const out = [];
  for(let w of raw){
    w = w.trim();
    if(w.length < 2) continue;            // Exclude single characters
    if(/^\d+$/.test(w)) continue;          // Exclude pure numbers
    if(STOPWORDS.has(w)) continue;         // Exclude stopwords
    out.push(w);
  }
  return out;
}

// Popular keywords: tally word frequency across titles in the latest snapshot's 'all' (per-country) set
async function loadKeywordsPopular(){
  if(!latestSnapshot) return [];
  const { data } = await sb.from('scout_videos').select('video_id,title')
    .eq('snapshot_id', latestSnapshot.id).eq('category_key','all').neq('country_code','GLOBAL')
    .limit(800);
  const seen=new Set(); const titles=[];
  (data||[]).forEach(r=>{ if(!seen.has(r.video_id)){ seen.add(r.video_id); titles.push(r.title); } });
  const freq = {};
  titles.forEach(t=> tokenize(t).forEach(w=>{ freq[w]=(freq[w]||0)+1; }));
  return Object.entries(freq)
    .filter(([w,n])=> n>=2)              // 2+ occurrences only
    .sort((a,b)=> b[1]-a[1])
    .slice(0,40)
    .map(([word,count])=>({word,count}));
}

// Rising keywords: word frequency increase between the latest snapshot and the previous one
async function loadKeywordsSurge(){
  const { data: snaps } = await sb.from('scout_snapshots')
    .select('*').eq('kind','popular').order('collected_at',{ascending:false}).limit(2);
  if(!snaps || snaps.length < 2) return { notReady:true };
  const freqOf = async (snapId)=>{
    const { data } = await sb.from('scout_videos').select('video_id,title')
      .eq('snapshot_id', snapId).eq('category_key','all').neq('country_code','GLOBAL').limit(800);
    const seen=new Set(); const f={};
    (data||[]).forEach(r=>{ if(!seen.has(r.video_id)){ seen.add(r.video_id); tokenize(r.title).forEach(w=>{ f[w]=(f[w]||0)+1; }); } });
    return f;
  };
  const cur = await freqOf(snaps[0].id);
  const prev = await freqOf(snaps[1].id);
  const rows = [];
  Object.entries(cur).forEach(([w,n])=>{
    const before = prev[w]||0;
    const delta = n - before;
    if(delta>0 && n>=2) rows.push({word:w, count:n, delta});
  });
  rows.sort((a,b)=> b.delta-a.delta);
  return { notReady:false, rows: rows.slice(0,40) };
}

async function copyText(text){
  try { await navigator.clipboard.writeText(text); return true; }
  catch(e){
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); document.body.removeChild(ta); return true; }
    catch(e2){ document.body.removeChild(ta); return false; }
  }
}

function bindKeywordCopy(words){
  // Click-to-copy for each keyword
  document.querySelectorAll('.kw').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const w = el.dataset.word;
      const ok = await copyText(w);
      if(ok){
        el.classList.add('copied');
        const hint = el.querySelector('.copyhint');
        if(hint) hint.textContent = 'Copied!';
        setTimeout(()=>{ el.classList.remove('copied'); if(hint) hint.textContent='Copy'; }, 1200);
      }
    });
  });
  // Copy all
  const btn = document.getElementById('copyAllBtn');
  if(btn){
    btn.addEventListener('click', async ()=>{
      const ok = await copyText(words.join(', '));
      if(ok){
        btn.classList.add('done');
        const orig = btn.textContent;
        btn.textContent = `${words.length} keywords copied!`;
        setTimeout(()=>{ btn.classList.remove('done'); btn.textContent = orig; }, 1500);
      }
    });
  }
}

function dedupeCCVideos(rows){
  const byVideo = new Map();
  (rows||[]).forEach(v=>{
    const cur = byVideo.get(v.video_id);
    if(!cur || (v.view_count||0) > (cur.view_count||0)) byVideo.set(v.video_id, v);
  });
  return [...byVideo.values()];
}

async function loadAccumulatedCCVideos(){
  const snaps = await loadCCSnapshots();
  if(!snaps.length) return [];
  const snapIds = snaps.map(s=>s.id);
  const all = [];
  const idBatch = 40;
  const pageSize = 1000;
  for(let i = 0; i < snapIds.length; i += idBatch){
    const batch = snapIds.slice(i, i + idBatch);
    let from = 0;
    while(true){
      const { data } = await sb.from('scout_videos').select('*')
        .in('snapshot_id', batch)
        .eq('license','creativeCommon')
        .order('view_count',{ascending:false})
        .range(from, from + pageSize - 1);
      if(!data || !data.length) break;
      all.push(...data);
      if(data.length < pageSize) break;
      from += pageSize;
    }
  }
  return dedupeCCVideos(all);
}

function buildCCTally(videos){
  const counts = {};
  (videos||[]).forEach(v=>{ counts[v.category_key]=(counts[v.category_key]||0)+1; });
  return Object.keys(CATEGORIES)
    .map(k=>({ key:k, name:CATEGORIES[k], count:counts[k]||0 }))
    .sort((a,b)=> b.count-a.count);
}

// CC video card (shows category)
function ccCardHTML(v, i){
  const catName = CATEGORIES[v.category_key] || '';
  return `<a class="card" href="${v.youtube_url}" target="_blank" rel="noopener">
    <div class="thumb">
      <div class="rankbadge">${i+1}</div>
      <div class="ccountry" style="color:#7ee787;">${catName}</div>
      <img src="${v.thumbnail_url}" loading="lazy" alt="${escapeHtml(v.title||'YouTube video')}">
    </div>
    <div class="cbody">
      <div class="ctitle">${escapeHtml(v.title)}</div>
      <div class="cmeta">
        <span class="views">${fmtViews(v.view_count)} views</span>
        <span>· 👍${fmtViews(v.like_count)}</span>
      </div>
      <div class="cmeta"><span class="cchan">${escapeHtml(v.channel||'')}</span></div>
    </div>
  </a>`;
}

// CC engagement card (engagement % + category)
function ccReactionCardHTML(v, i){
  const catName = CATEGORIES[v.category_key] || '';
  const pct = (v.engagement*100).toFixed(1);
  return `<a class="card" href="${v.youtube_url}" target="_blank" rel="noopener">
    <div class="thumb">
      <div class="rankbadge">${i+1}</div>
      <div class="ccountry" style="color:#ff7eb6;">Engagement ${pct}%</div>
      <img src="${v.thumbnail_url}" loading="lazy" alt="${escapeHtml(v.title||'YouTube video')}">
    </div>
    <div class="cbody">
      <div class="ctitle">${escapeHtml(v.title)}</div>
      <div class="cmeta">
        <span class="views" style="color:#ff7eb6;">Engagement ${pct}%</span>
        <span>· ${fmtViews(v.view_count)} views</span>
        ${catName?`<span>· ${catName}</span>`:''}
      </div>
      <div class="cmeta"><span class="cchan">${escapeHtml(v.channel||'')}</span></div>
    </div>
  </a>`;
}

// CC rising card (increase amount + category)
function ccSurgeCardHTML(v, i){
  const catName = CATEGORIES[v.category_key] || '';
  return `<a class="card" href="${v.youtube_url}" target="_blank" rel="noopener">
    <div class="thumb">
      <div class="rankbadge">${i+1}</div>
      <div class="ccountry" style="color:#c77dff;">▲ ${fmtViews(v.delta)}</div>
      <img src="${v.thumbnail_url}" loading="lazy" alt="${escapeHtml(v.title||'YouTube video')}">
    </div>
    <div class="cbody">
      <div class="ctitle">${escapeHtml(v.title)}</div>
      <div class="cmeta">
        <span class="views" style="color:#c77dff;">+${fmtViews(v.delta)} increase</span>
        <span>· Total ${fmtViews(v.view_count)}</span>
        ${catName?`<span>· ${catName}</span>`:''}
      </div>
      <div class="cmeta"><span class="cchan">${escapeHtml(v.channel||'')}</span></div>
    </div>
  </a>`;
}

async function render(){
  const content = $('#content');
  content.innerHTML = `<div class="state"><div class="spin"></div><div>Loading...</div></div>`;

  // The rising view is handled separately
  if(state.view==='rising'){
    const periodName = {1:'Daily',7:'Weekly',30:'Monthly'}[state.risingPeriod] || '';
    const r = await loadRising(state.risingPeriod);
    $('#sectitle').firstChild.textContent = `Rising · ${periodName} `;
    if(r.notReady){
      $('#count').textContent = '';
      let msg;
      if(r.reason==='firstrun'){
        msg = `Rising is calculated by <b style="color:var(--txt)">comparing changes over a time period</b>.<br><br>
          There's only 1 collection snapshot so far, so there's no earlier data to compare against.<br>
          <b style="color:var(--accent)">Once tomorrow's automatic collection runs</b>, daily rising will start showing.`;
      } else {
        const need = r.needDays, have = r.haveDays||0;
        const left = Math.max(1, need - have);
        msg = `${periodName} rising needs <b style="color:var(--txt)">about ${need} days of data</b>.<br><br>
          About ${have} days have accumulated so far.<br>
          <b style="color:var(--accent)">In about ${left} more day(s)</b>, ${periodName.toLowerCase()} rising will start showing.`;
      }
      content.innerHTML = `<div class="state">${msg}</div>`;
      return;
    }
    $('#count').textContent = r.rows.length ? `${r.rows.length} · change over the last ${r.spanDays} days` : '';
    if(!r.rows.length){
      content.innerHTML = `<div class="state">No videos with rising view counts were found for this period.</div>`;
      return;
    }
    await renderRichVideoPage({
      rows: r.rows, cardFn: risingCardHTML,
      sectitle: `Rising · ${periodName}`, countText: $('#count').textContent
    });
    return;
  }

  // Reuse Allowed (CC) view
  if(state.view==='cc'){
    const snap = await loadLatestCCSnapshot();
    if(!snap){
      $('#sectitle').firstChild.textContent = 'Reuse Allowed ';
      $('#count').textContent = '';
      content.innerHTML = `<div class="state">
        No Reuse Allowed (CC) data yet.<br>
        Please run the CC collector first.
      </div>`;
      return;
    }
    const ccDate = snap.collected_at ? new Date(snap.collected_at).toLocaleDateString('en-US') : '';
    const noticeHTML = `<div class="ccnotice">
      ⚠️ These are videos YouTube has marked as <b>'Reuse Allowed (CC BY)'</b>.
      Using them requires <b>crediting the original creator</b>, and some elements within a video — such as music or clips — may carry separate copyright, so
      <b>please check the video's description directly</b>.
    </div>`;

    function tallyHTML(tally){
      return `<div class="cctally">
        <div class="cctally-title">Reuse Allowed Video Count by Category</div>
        <div class="cctally-grid">
          ${tally.map(t=>`
            <div class="cccount ${t.count===0?'zero':''}">
              <span class="cccount-name">${t.name}</span>
              <span class="cccount-num">${t.count}</span>
            </div>`).join('')}
        </div>
      </div>`;
    }

    // --- Engagement mode ---
    if(state.ccMode==='reaction'){
      const rows = await loadCCReaction();
      $('#sectitle').firstChild.textContent = 'Reuse Allowed · Top Engagement ';
      $('#count').textContent = rows.length ? `${rows.length}` : '';
      if(!rows.length){ content.innerHTML = noticeHTML + `<div class="state">No videos to display.</div>`; return; }
      content.innerHTML = noticeHTML + `<div class="grid">${rows.map((v,i)=>ccReactionCardHTML(v,i)).join('')}</div>`;
      return;
    }

    // --- Rising mode ---
    if(state.ccMode==='surge'){
      const r = await loadCCSurge();
      $('#sectitle').firstChild.textContent = 'Reuse Allowed · Rising ';
      if(r.notReady){
        $('#count').textContent = '';
        content.innerHTML = noticeHTML + `<div class="state">
          Rising is calculated by <b style="color:var(--txt)">comparing last week to this week</b>.<br><br>
          CC data is collected once a week, so there's no prior week's data to compare against yet.<br>
          <b style="color:#7ee787;">After next week's collection</b>, rising will start showing.
        </div>`;
        return;
      }
      $('#count').textContent = r.rows.length ? `${r.rows.length} · vs. last week` : '';
      if(!r.rows.length){ content.innerHTML = noticeHTML + `<div class="state">No videos rose this week.</div>`; return; }
      content.innerHTML = noticeHTML + `<div class="grid">${r.rows.map((v,i)=>ccSurgeCardHTML(v,i)).join('')}</div>`;
      return;
    }

    // --- Popular (default): this week's CC ---
    const { tally, videos } = await loadCCCurrentWeek();
    $('#sectitle').firstChild.textContent = 'Reuse Allowed ';
    $('#count').textContent = videos.length ? `${videos.length}` : '';
    if(!videos.length){
      content.innerHTML = noticeHTML + `<div class="state">No Reuse Allowed videos found.</div>`;
      return;
    }
    content.innerHTML = noticeHTML + tallyHTML(tally) + `<div class="grid">${videos.map((v,i)=>ccCardHTML(v,i)).join('')}</div>`;
    return;
  }

  // Past CC Search — accumulated catalog (own tab, same card layout as live site)
  if(state.view==='pastcc'){
    const snap = await loadLatestCCSnapshot();
    if(!snap){
      $('#sectitle').firstChild.textContent = 'Past CC Search ';
      $('#count').textContent = '';
      content.innerHTML = `<div class="state">No CC data yet. Please run the CC collector first.</div>`;
      return;
    }
    const ccDate = snap.collected_at ? new Date(snap.collected_at).toLocaleDateString('en-US') : '';
    const { tally, videos, weeks } = await loadCCArchive();
    const noticeHTML = `<div class="ccnotice">
      <div style="margin-bottom:6px;"><b style="color:#7ee787;">📚 Growing catalog</b> <span style="color:#9aa;">· ${weeks} week${weeks===1?'':'s'} collected · Last added: ${ccDate}</span></div>
      ⚠️ Reuse-allowed (CC BY) videos — credit the original creator and check each video's YouTube description.
    </div>`;
    function tallyHTML(tally){
      return `<div class="cctally">
        <div class="cctally-title">Reuse Allowed Video Count by Category</div>
        <div class="cctally-grid">
          ${tally.map(t=>`
            <div class="cccount ${t.count===0?'zero':''}">
              <span class="cccount-name">${t.name}</span>
              <span class="cccount-num">${t.count}</span>
            </div>`).join('')}
        </div>
      </div>`;
    }
    $('#sectitle').firstChild.textContent = 'Past CC Search ';
    $('#count').textContent = videos.length ? `${videos.length} · accumulated` : '';
    if(!videos.length){
      content.innerHTML = noticeHTML + `<div class="state">No past CC videos found yet.</div>`;
      return;
    }
    content.innerHTML = noticeHTML + tallyHTML(tally) + `<div class="grid">${videos.map((v,i)=>ccCardHTML(v,i)).join('')}</div>`;
    return;
  }

  // Keyword trends view
  if(state.view==='keyword'){
    if(state.keywordMode==='popular'){
      const kws = await loadKeywordsPopular();
      $('#sectitle').firstChild.textContent = 'Popular Keywords ';
      $('#count').textContent = kws.length ? `Top ${kws.length}` : '';
      if(!kws.length){ content.innerHTML = `<div class="state">No data available to extract keywords from.</div>`; return; }
      const trends = await loadTrendsPanel(TREND_THEME_BY_VIEW.keyword);
      const intro = viewIntroHTML('Popular keywords from trending titles', [
        'Frequently occurring words extracted from today\'s trending video titles across collected countries.',
        'Use these alongside Google Trends below to validate search demand before scripting shorts or long-form videos.'
      ]);
      const kwHtml = keywordListHTML(kws.map(k=>({word:k.word, count:k.count})), false);
      const kwText = `<section class="textCatalog"><h3>Keyword text index</h3><ol>${kws.slice(0,40).map((k,i)=>`<li><strong>#${i+1} ${escapeHtml(k.word)}</strong> — appears in ${k.count} trending title${k.count===1?'':'s'} today.</li>`).join('')}</ol></section>`;
      content.innerHTML = intro + trends + kwHtml + kwText;
      bindKeywordCopy(kws.map(k=>k.word));
      return;
    } else {
      const r = await loadKeywordsSurge();
      $('#sectitle').firstChild.textContent = 'Rising Keywords ';
      if(r.notReady){
        $('#count').textContent = '';
        content.innerHTML = `<div class="state">
          Rising keywords are calculated by <b style="color:var(--txt)">comparing yesterday's and today's keywords</b>.<br><br>
          There's only 1 collection snapshot so far, so there's no earlier data to compare against.<br>
          <b style="color:var(--accent)">Once tomorrow's automatic collection runs</b>, rising keywords will start showing.
        </div>`;
        return;
      }
      $('#count').textContent = r.rows.length ? `Top ${r.rows.length}` : '';
      if(!r.rows.length){ content.innerHTML = `<div class="state">No keywords rose during this period.</div>`; return; }
      content.innerHTML = keywordListHTML(r.rows, true);
      bindKeywordCopy(r.rows.map(k=>k.word));
      return;
    }
  }

  // Top engagement view
  if(state.view==='engagement'){
    const rows = await loadEngagement();
    await renderRichVideoPage({
      rows, cardFn: engagementCardHTML,
      sectitle: 'Top Engagement',
      countText: rows.length ? `${rows.length} · videos with 10K+ views` : ''
    });
    return;
  }

  let filter={}, title='';
  if(state.view==='global'){ filter={country_code:'GLOBAL', limit:100}; title='Global Trending'; }
  else if(state.view==='continent'){ filter={continent:state.continent, dedupe:true, limit:200}; title=`${CONTINENTS[state.continent]} Trending`; }
  else if(state.view==='country'){ filter={country_code:state.country, limit:50}; title=`${COUNTRY_NAMES[state.country]} Trending`; }
  else if(state.view==='category'){ filter={category_key:state.category, limit:50}; title=`${CATEGORIES[state.category]} Trending`; }

  const vids = await loadVideos(filter);
  await renderRichVideoPage({
    rows: vids.slice(0, filter.limit), cardFn: cardHTML,
    sectitle: title, countText: vids.length ? `${Math.min(vids.length, filter.limit)}` : ''
  });
}

// Tab switching
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  state.view = t.dataset.view;
  renderChips(); render();
}));

// Init
(async ()=>{
  latestSnapshot = await loadLatestSnapshot();
  if(latestSnapshot){
    const d = new Date(latestSnapshot.collected_at);
    $('#updated').textContent = `Updated ${d.toLocaleString('en-US')}`;
  } else {
    $('#content').innerHTML = `<div class="state">No data has been collected yet. Please run the collector first.</div>`;
    return;
  }
  renderChips();
  render();
})();
</script>
</body>
</html>
