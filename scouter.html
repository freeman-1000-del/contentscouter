<style>
  :root{
    --bg:#0d0f14; --panel:#161922; --panel2:#1e222d; --line:#2a2f3c;
    --txt:#eef1f6; --sub:#aeb6c4; --hint:#6b7385;
    --accent:#ff5436; --accent2:#ffb454; --accent3:#4ea1ff;
    --good:#46d39a;
    --page-gray:#505050;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background:var(--page-gray);overflow-x:hidden;overflow-y:visible}
  body{
    background:var(--page-gray); color:var(--txt);
    font-family:"Pretendard","Noto Sans JP","Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.5; padding:0; width:100%; margin:0;
    overflow-x:hidden;overflow-y:visible;
  }
  .scouterShell{
    width:100%;
    max-width:100%;
    margin:0;
    background:var(--bg);
    border:2px solid #1e2433;
    border-radius:12px;
    padding:28px 28px 60px;
    box-shadow:0 8px 40px rgba(0,0,0,.45);
    overflow-x:hidden;
    box-sizing:border-box;
  }
  @media(max-width:960px){
    .scouterShell{margin:0 12px;width:auto;padding:20px 16px 48px}
  }
  .eyebrow{display:none}
  h1{font-size:38px; font-weight:800; letter-spacing:-.02em; margin:8px 0 6px; line-height:1.15;}
  .lead{color:var(--sub); font-size:14px;}
  .lead .upd{color:var(--hint); font-size:12px; margin-left:6px;}
  .refreshBanner{
    text-align:left; margin:4px 0 8px; max-width:100%;
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:4px 10px; font-size:10px; line-height:1.4; color:var(--hint);
  }
  .refreshBanner.cc{border-color:rgba(126,231,135,.28); background:rgba(22,48,42,.45);}
  .refreshBannerLabel{font-size:10px;color:var(--hint);}
  .refreshBannerClock{font-size:11px;font-weight:700;color:var(--accent2);font-variant-numeric:tabular-nums;margin:0 5px;}
  .refreshBanner.cc .refreshBannerClock{color:#7ee787;}
  .refreshBannerSub{font-size:10px;color:var(--hint);}
  .refreshBanner.hidden{display:none;}
  .ccTimerInline{margin-bottom:14px;}
  .ccCatRow{display:flex;flex-wrap:wrap;gap:8px;width:100%;margin-top:12px;}
  .chipCount{font-size:10px;opacity:.85;margin-left:4px;}

  /* View buttons — always one row (iframe is ~900px; grid 2-col was causing stock-board layout) */
  .tabs{
    display:flex; flex-wrap:nowrap; gap:7px; margin:24px 0 8px;
    overflow-x:auto; scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:1 1 0; min-width:108px;
    background:var(--panel); border:1.5px solid var(--line); border-radius:14px;
    padding:10px 8px; cursor:pointer; transition:.15s; text-align:left;
  }
  .tab:hover{border-color:#3a4150; transform:translateY(-1px);}
  .tab.on{border-color:var(--accent); background:var(--panel2);}
  .tab .dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:7px;}
  .tab.kill{border-color:#7ee787; background:linear-gradient(145deg,#16302a,var(--panel)); box-shadow:0 0 0 1px rgba(126,231,135,.25), 0 4px 16px rgba(126,231,135,.12);}
  .tab.kill .t{color:#7ee787;}
  .tab.kill:hover{border-color:#7ee787; box-shadow:0 0 0 1px rgba(126,231,135,.4), 0 6px 20px rgba(126,231,135,.2);}
  .tab.kill.on{border-color:#7ee787; background:linear-gradient(145deg,#1c3d34,var(--panel2));}
  .tab .t{font-size:13px; font-weight:700; color:var(--accent2);}
  .tab .d{font-size:10px; color:var(--hint); margin-top:3px; line-height:1.35;}

  /* Sub-selection (country/category/continent chips) */
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 4px; min-height:0;}
  .chip{
    background:var(--panel); border:1px solid var(--line); border-radius:20px;
    padding:7px 14px; font-size:13px; color:var(--sub); cursor:pointer; transition:.12s;
  }
  .chip:hover{border-color:#3a4150; color:var(--txt);}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;}

  .sectitle{font-size:19px; font-weight:800; color:var(--accent2); margin:24px 0 14px; display:flex; align-items:center; gap:10px;}
  .sectitle::before{content:""; width:4px; height:18px; background:var(--accent2); border-radius:3px; display:inline-block;}
  .sectitle .count{font-size:12px; color:var(--hint); font-weight:600;}

  /* Video grid */
  .grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; min-width:0}
  .cardArticle{min-width:0}
  .card{min-width:0}
  @media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:640px){h1{font-size:28px;}}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:.15s; text-decoration:none; color:inherit; display:flex; flex-direction:column;}
  .card:hover{transform:translateY(-3px); border-color:#3a4150;}
  .thumb{position:relative; aspect-ratio:16/9; background:#0a0c10; overflow:hidden;}
  .thumb img{width:100%; height:100%; object-fit:cover;}
  .rankbadge{position:absolute; top:8px; left:8px; background:rgba(13,15,20,.85); color:#fff; font-size:12px; font-weight:800; width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center;}
  .ccountry{position:absolute; top:8px; right:8px; background:rgba(13,15,20,.8); color:var(--accent2); font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px;}
  .cbody{padding:11px 12px 13px;}
  .ctitle{font-size:13px; font-weight:600; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:35px;}
  .cmeta{margin-top:8px; font-size:11px; color:var(--hint); display:flex; flex-wrap:wrap; gap:5px; align-items:center;}
  .views{color:var(--accent2); font-weight:800;}
  .viewbadge{
    position:absolute; right:8px; bottom:8px;
    background:rgba(13,15,20,.88); color:var(--accent2);
    font-size:12px; font-weight:800; padding:4px 8px; border-radius:8px;
    letter-spacing:.02em;
  }
  .searchBar{
    display:flex; flex-wrap:wrap; gap:8px; align-items:center;
    margin:0 0 14px; padding:12px; border-radius:12px;
    background:var(--panel); border:1px solid var(--line);
  }
  .searchBar input{
    flex:1; min-width:180px; padding:10px 12px; border-radius:10px;
    border:1px solid var(--line); background:var(--panel2); color:var(--txt); font-size:14px;
  }
  .searchBar button{
    padding:10px 14px; border-radius:10px; border:0; font-weight:800; cursor:pointer; font-size:13px;
  }
  .searchBar .btnFilter{background:var(--panel2); color:var(--txt); border:1px solid var(--line)}
  .searchBar .btnYt{background:var(--accent); color:#fff}
  .searchBar .btnClear{background:transparent; color:var(--sub); border:1px solid var(--line)}
  .searchApiNote{width:100%; font-size:12px; color:var(--hint); line-height:1.45; margin:2px 0 0}
  .searchApiNote b{color:var(--accent2)}
  .searchApiUsed{color:var(--good); font-weight:700}
  .cchan{color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;}

  .state{padding:60px 20px; text-align:center; color:var(--hint); font-size:14px;}
  .kwgrid{display:flex; flex-wrap:wrap; gap:10px;}
  .kw{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; display:flex; align-items:center; gap:10px; transition:.12s;
    cursor:pointer; user-select:none;
  }
  .kw:hover{border-color:#5ad1c8; background:var(--panel2);}
  .kw:active{transform:scale(0.97);}
  .kw.copied{border-color:#5ad1c8; background:#16302d;}
  .kw .word{font-size:15px; font-weight:700; color:var(--txt);}
  .kw .cnt{font-size:12px; color:var(--hint);}
  .kw .up{font-size:12px; color:#5ad1c8; font-weight:700;}
  .kw .rk{font-size:12px; color:var(--accent2); font-weight:800; min-width:20px;}
  .kw .copyhint{font-size:11px; color:#5ad1c8; margin-left:2px; opacity:0; transition:.12s;}
  .kw:hover .copyhint{opacity:.7;}
  .kw.copied .copyhint{opacity:1; color:#5ad1c8;}
  .kwbar{display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap;}
  .copyall{
    background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:9px 18px; font-size:13px; font-weight:700; cursor:pointer; transition:.12s;
  }
  .copyall:hover{filter:brightness(1.1);}
  .copyall:active{transform:scale(0.97);}
  .copyall.done{background:#5ad1c8; color:#0d0f14;}
  .kwtip{font-size:12px; color:var(--hint);}
  .catnote{width:100%; margin-top:10px; padding:11px 15px; font-size:12.5px; color:var(--hint); background:var(--panel); border:1px solid var(--line); border-radius:10px; line-height:1.5;}
  .ccnotice{
    background:#2a2410; border:1px solid #5c4a1a; border-radius:12px;
    padding:13px 18px; margin-bottom:16px; font-size:13px; line-height:1.6; color:#d4c89a;
  }
  .ccnotice b{color:#f0d97a;}
  .cctally{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:20px;}
  .cctally-title{font-size:13px; font-weight:700; color:var(--accent2); margin-bottom:14px;}
  .cctally-grid{display:flex; flex-wrap:wrap; gap:8px;}
  .cccount{display:flex; align-items:center; gap:8px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:8px 14px;}
  .cccount-name{font-size:13px; color:var(--txt);}
  .cccount-num{font-size:14px; font-weight:800; color:#7ee787;}
  .cccount.zero{opacity:.45;}
  .cccount.zero .cccount-num{color:var(--hint);}
  .cccount-pick{cursor:pointer;font:inherit;text-align:left;}
  .cccount-pick.on{border-color:#7ee787;box-shadow:0 0 0 1px rgba(126,231,135,.35);}
  .cccount-pick:disabled{cursor:default;}
  .ccTimerSlot.hidden{display:none;}
  .ccTimerSlot{margin:-6px 0 10px;}
  .spin{display:inline-block; width:22px; height:22px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp .8s linear infinite; margin-bottom:12px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .cardArticle{display:flex;flex-direction:column}
  .cardArticle .card{border-radius:14px 14px 0 0}
  .videoReactions{
    font-size:12px;line-height:1.55;color:var(--hint);
    padding:10px 12px 13px;margin:0;
    background:var(--panel);border:1px solid var(--line);border-top:0;
    border-radius:0 0 14px 14px;
    word-break:break-word;overflow-wrap:anywhere;
  }
  .videoReactions .videoDesc{color:var(--sub);margin:0 0 10px;font-size:12px;line-height:1.5}
  .videoReactions .reactionsTitle{font-size:11px;font-weight:700;color:var(--accent2);margin:0 0 6px;text-transform:uppercase;letter-spacing:.04em}
  .commentList{margin:0;padding:0;list-style:none}
  .commentList li{margin:0 0 8px;padding:8px 10px;background:var(--panel2);border-radius:8px;border:1px solid var(--line)}
  .commentList li strong{color:var(--txt);font-size:12px}
  .commentList .commentText{display:block;margin-top:4px;color:var(--sub)}
  .commentList .commentLikes{font-size:11px;color:var(--hint);margin-top:3px}
  .reactionsLoading,.reactionsEmpty{margin:0;font-size:12px;color:var(--hint)}
  .commentsToggle{
    margin:0;border:0;background:transparent;color:var(--accent2);
    font-size:12px;font-weight:700;cursor:pointer;padding:0;text-align:left;
  }
  .commentsToggle:hover{color:#ffd08a;text-decoration:underline}
  .commentsPanel{display:none;margin-top:10px}
  .commentsPanel.open{display:block}
  .viewIntro{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;margin-bottom:18px;font-size:14px;line-height:1.65;color:var(--sub);
  }
  .viewIntroTitle{font-size:17px;font-weight:800;color:var(--accent2);margin:0 0 10px}
  .viewIntro p{margin:0 0 10px}
  .viewIntro p:last-child{margin-bottom:0}
  .trendsPanel{
    background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;margin-bottom:18px;font-size:13px;line-height:1.6;color:var(--sub);
  }
  .trendsPanel h3{margin:0 0 8px;font-size:15px;color:#5ad1c8}
  .trendsPanel ul{margin:8px 0;padding-left:20px}
  .trendsPanel li{margin:5px 0}
  .trendsNote{font-size:11px;color:var(--hint);margin:10px 0 0}
  .textCatalog{
    margin-top:28px;padding:20px;border:1px solid var(--line);border-radius:14px;
    background:var(--panel);font-size:13px;line-height:1.6;color:var(--sub);
  }
  .textCatalog h3{font-size:16px;color:var(--accent2);margin:0 0 10px}
  .textCatalog ol{margin:12px 0 0;padding-left:22px}
  .textCatalog li{margin:0 0 12px}

  .authGate{
    max-width:420px;margin:40px auto;padding:28px 24px;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
  }
  .authGate h2{font-size:20px;margin:0 0 8px;color:var(--txt)}
  .authGate .authLead{color:var(--sub);font-size:13px;margin:0 0 18px;line-height:1.55}
  .authGate label{display:block;font-size:12px;color:var(--hint);margin:0 0 6px}
  .authGate input{
    width:100%;padding:11px 12px;margin:0 0 14px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:14px;
  }
  .authGate .authRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .authGate button{
    flex:1;min-width:120px;padding:11px 14px;border:0;border-radius:10px;
    font-weight:800;cursor:pointer;font-size:14px;
  }
  .authGate .btnPrimary{background:var(--accent);color:#fff}
  .authGate .btnGhost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .authGate .authErr{color:#ff8b8b;font-size:13px;min-height:1.2em;margin:8px 0 0}
  .authGate .authOk{color:var(--good);font-size:13px;margin:8px 0 0}
  .userBar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    margin:0 0 16px;padding:10px 12px;border-radius:12px;
    background:var(--panel);border:1px solid var(--line);font-size:13px;color:var(--sub);

    background:var(--panel2);color:var(--txt);cursor:pointer;font-weight:700;
  }
  .scouterShell[hidden], .authGate[hidden]{display:none!important}

<body>
<!-- scouter-dedupe-v3: same clip merges by title prefix; channel name ignored -->


<div id="authGate" class="authGate">
  <h2>일본 유튜브트랜드</h2>
  <p class="authLead">테스트용 · 관리자 4자리 PIN만 입력하세요.</p>
  <label for="authPin">PIN (4자리)</label>
  <input id="authPin" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]*" autocomplete="off" placeholder="••••" />
  <div class="authRow">

const SUPABASE_URL = window.HUMATECK_CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.HUMATECK_CONFIG.SUPABASE_ANON_KEY;

const ACCESS_PIN = String(window.HUMATECK_CONFIG.ACCESS_PIN || MARKET.accessPin || '').trim();

const COUNTRY_NAMES = {
  US:"United States", CA:"Canada", MX:"Mexico", GB:"United Kingdom", DE:"Germany", FR:"France",

};

};

const KIND_LONG = 'jp_long';
const KIND_SHORTS = 'jp_shorts';
function kindForView(view, risingFormat){
  if(view === 'shorts') return KIND_SHORTS;
  if(view === 'rising') return risingFormat === 'shorts' ? KIND_SHORTS : KIND_LONG;
  if(view === 'keyword') return risingFormat === 'shorts' ? KIND_SHORTS : KIND_LONG;

}

let latestSnapshot = null;
let latestCcSnapshot = null;
let trackedSnapshotId = null;

const LOCALE = (window.HUMATECK_CONFIG.MARKET && window.HUMATECK_CONFIG.MARKET.locale) || 'ko-KR';
const COLLECTION_INTERVAL_MS = 24 * 60 * 60 * 1000;
const CC_COLLECTION_INTERVAL_MS = 3 * 24 * 60 * 60 * 1000;

const $ = (s)=>document.querySelector(s);
const fmtViews = (n)=>{ n=Number(n)||0;
  if(n>=1e9) return (n/1e9).toFixed(1)+"B"; if(n>=1e6) return (n/1e6).toFixed(1)+"M"; if(n>=1e3) return (n/1e3).toFixed(1)+"K"; return ""+n; };
const agoText = (iso)=>{ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return "";
  const days=Math.floor((Date.now()-d.getTime())/86400000);
  if(days<=0) return "Today"; if(days<7) return days+"d ago";
  if(days<30) return Math.floor(days/7)+"w ago"; if(days<365) return Math.floor(days/30)+"mo ago";
  return Math.floor(days/365)+"y ago"; };

// Find the latest collection snapshot （日本ロング/ショート）
async function loadLatestSnapshot(kind = KIND_LONG){
  const { data, error } = await sb.from('scout_snapshots')
    .select('*').eq('kind', kind).order('collected_at',{ascending:false}).limit(1);
  if(error || !data || !data.length) return null;

}

async function peekLatestSnapshot(kind = KIND_LONG){
  const { data, error } = await sb.from('scout_snapshots')
    .select('id,collected_at').eq('kind', kind).order('collected_at',{ascending:false}).limit(1);
  if(error || !data || !data.length) return null;
  return data[0];
}

async function ensureSnapshotForView(){
  const kind = kindForView(state.view, state.risingFormat);
  if(!latestSnapshot || latestSnapshot.kind !== kind){
    latestSnapshot = await loadLatestSnapshot(kind);
    if(latestSnapshot) trackedSnapshotId = latestSnapshot.id;
  }
  return latestSnapshot;
}

function getNextCollectionAt(){
  if(!latestSnapshot?.collected_at) return null;
  return new Date(latestSnapshot.collected_at).getTime() + COLLECTION_INTERVAL_MS;
}

/** Always show remaining time to the next interval tick (never swap to a status phrase). */
function remainUntilNextCycle(collectedAt, intervalMs){
  const start = new Date(collectedAt).getTime();
  if(!Number.isFinite(start) || !intervalMs) return 0;
  const elapsed = Date.now() - start;
  if(elapsed < 0) return intervalMs;
  const into = elapsed % intervalMs;
  return into === 0 ? intervalMs : (intervalMs - into);
}

function formatCountdown(ms){
  const sec = Math.floor(Math.max(0, ms) / 1000);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if(h > 0) return `${h}h ${m}m`;
  if(m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function formatCountdownClock(ms){
  const sec = Math.floor(Math.max(0, ms) / 1000);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  const pad = (n)=> String(n).padStart(2,'0');
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

    if(el) el.textContent = '';
    label.textContent = '다음 갱신';
    clock.textContent = '--:--:--';
    if(sub) sub.textContent = '· 毎日 · JP';

  }
  const d = new Date(snap.collected_at);
  if(el) el.textContent = `更新 ${d.toLocaleString(LOCALE)}`;
  const remain = remainUntilNextCycle(snap.collected_at, interval);
  label.textContent = '다음 갱신';
  clock.textContent = formatCountdownClock(remain);
  if(sub) sub.textContent = `· ${d.toLocaleDateString(LOCALE)} · 日本`;
}

async function pollForFreshSnapshot(){
  const kind = kindForView(state.view, state.risingFormat);
  const peek = await peekLatestSnapshot(kind);
  if(peek){
    if(trackedSnapshotId && peek.id !== trackedSnapshotId){
      latestSnapshot = await loadLatestSnapshot(kind);
      trackedSnapshotId = latestSnapshot?.id || peek.id;
      if(state.view !== 'cc'){
        updateRefreshLabels();
        renderChips();
        render();
      }
    } else {
      trackedSnapshotId = peek.id;
    }
  }
  const ccPeek = await peekLatestCCSnapshot();
  if(!ccPeek) return;
  if(trackedCcSnapshotId && ccPeek.id !== trackedCcSnapshotId){
    latestCcSnapshot = await loadLatestCCSnapshot();
    trackedCcSnapshotId = latestCcSnapshot?.id || ccPeek.id;
    ccTallyCache = null;
    if(state.view === 'cc'){
      updateRefreshLabels();
      renderChips();
      render();
    }
    return;
  }
  trackedCcSnapshotId = ccPeek.id;
}

function dedupeCCVideos(rows){
  const byVideo = new Map();
  (rows||[]).forEach(v=>{
    const cur = byVideo.get(v.video_id);
    if(!cur || (v.view_count||0) > (cur.view_count||0)) byVideo.set(v.video_id, v);
  });
  return [...byVideo.values()];
}

function buildCCTally(videos){
  const counts = {};
  (videos||[]).forEach(v=>{ counts[v.category_key]=(counts[v.category_key]||0)+1; });
  return Object.keys(CATEGORIES)
    .map(k=>({ key:k, name:CATEGORIES[k], count:counts[k]||0 }))
    .sort((a,b)=> b.count-a.count);
}

async function loadCCCurrentWeek(){
  if(!latestCcSnapshot) latestCcSnapshot = await loadLatestCCSnapshot();
  const snap = latestCcSnapshot;
  if(!snap) return { tally:[], videos:[] };
  const { data } = await sb.from('scout_videos').select('*')
    .eq('snapshot_id', snap.id).eq('license','creativeCommon')
    .order('view_count',{ascending:false}).limit(800);
  const videos = dedupeCCVideos(data||[]).sort((a,b)=>(b.view_count||0)-(a.view_count||0));
  const tally = buildCCTally(data||[]);
  ccTallyCache = tally;
  return { tally, videos, totalCollected: (data||[]).length };
}

  return rows.slice(0,40);
}

/**
 * 기간별 인기: 우리 일일 스냅샷 누적 (API 0).
 * days=1 → 최신 스냅샷만.
 * YouTube엔 '한달/1년 차트' API가 없어, 스냅샷이 부족하면 null 반환 → 호출측에서 기간검색 안내.
 */
async function loadPeriodPopular(kind, days = 7, limit = 120){
  const snapLimit = days <= 1 ? 1 : Math.min(400, Math.max(14, days + 5));
  const { data: snaps, error: sErr } = await sb.from('scout_snapshots')
    .select('id,collected_at')
    .eq('kind', kind)
    .order('collected_at', { ascending:false })
    .limit(snapLimit);
  if(sErr || !snaps?.length) return { rows:[], mode:'empty', spanDays:0, snapCount:0 };

  if(days <= 1){
    const { data, error } = await sb.from('scout_videos').select('*')
      .eq('snapshot_id', snaps[0].id)
      .eq('country_code', 'JP')
      .eq('category_key', 'all')
      .order('view_count', { ascending:false })
      .limit(limit);
    if(error){ console.error(error); return { rows:[], mode:'empty', spanDays:0, snapCount:0 }; }
    return { rows: dedupeSimilarVideos(data||[]).slice(0, limit), mode:'latest', spanDays:0, snapCount:1 };
  }

  const cutoff = Date.now() - days * 86400000;
  const inWindow = snaps.filter(s => new Date(s.collected_at).getTime() >= cutoff);
  const ids = (inWindow.length ? inWindow : snaps).map(s => s.id);
  const oldest = ids.length
    ? Math.min(...(inWindow.length?inWindow:snaps).map(s => new Date(s.collected_at).getTime()))
    : Date.now();
  const spanDays = Math.max(0, Math.round((Date.now() - oldest) / 86400000));

  const { data, error } = await sb.from('scout_videos').select('*')
    .in('snapshot_id', ids)
    .eq('country_code', 'JP')
    .eq('category_key', 'all')
    .order('view_count', { ascending:false })
    .limit(1200);
  if(error){ console.error(error); return { rows:[], mode:'empty', spanDays, snapCount:ids.length }; }

  const best = new Map();
  for(const v of (data||[])){
    const prev = best.get(v.video_id);
    if(!prev || (v.view_count||0) > (prev.view_count||0)) best.set(v.video_id, v);
  }
  const rows = dedupeSimilarVideos(
    [...best.values()].sort((a,b)=>(b.view_count||0)-(a.view_count||0))
  ).slice(0, limit);

  // 요청 기간의 절반 미만만 쌓였으면 '부분' — UI에서 기간검색 보완 가능 안내
  const mode = spanDays >= days * 0.5 ? 'accum' : 'partial';
  return { rows, mode, spanDays, snapCount: ids.length };
}

async function loadLongformWeek(limit = 120){
  const r = await loadPeriodPopular(KIND_LONG, 7, limit);
  return r.rows;
}

// Fetch videos (based on the latest snapshot)
async function loadVideos(filter){
  if(!latestSnapshot) return [];

  // Category view: if the same video spans multiple categories, show it only in the one it's ranked highest in
  if(filter.category_key){
    return await loadCategoryVideos(filter.category_key, filter.limit||50);
  }

  let q = sb.from('scout_videos').select('*').eq('snapshot_id', latestSnapshot.id);
  if(filter.country_code) q = q.eq('country_code', filter.country_code).eq('category_key','all');
  if(filter.continent)    q = q.eq('continent', filter.continent).eq('category_key','all');
  // For views that need deduplication, fetch a generous pool of candidates first, then trim
  const fetchLimit = filter.dedupe ? 800 : (filter.limit||100);
  q = q.order('view_count',{ascending:false}).limit(fetchLimit);
  const { data, error } = await q;
  if(error){ console.error(error); return []; }
  if(filter.dedupe){
    const byId = [];
    const seenId = new Set();
    for(const v of (data||[])){
      if(seenId.has(v.video_id)) continue;
      seenId.add(v.video_id);
      byId.push(v);
    }
    return dedupeSimilarVideos(byId);
  }
  return data||[];
}

/** Collapse language / regional re-uploads of the same clip. Channel name is never part of the key. */
function normalizeTitleDedupeKey(title){
  return (title||'')
    .toLowerCase()
    .normalize('NFKD')
    .replace(/\([^)]*\)/g, ' ')
    .replace(/\[[^\]]*\]/g, ' ')
    .replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}]/gu, '')
    .replace(/\b(hindi|kannada|tamil|telugu|malayalam|punjabi|bengali|english|official|lyrical|lyrics|mv|m\/v)\b/gi, ' ')
    .replace(/[^a-z0-9\u3131-\uD79D\u3040-\u30ff\u4e00-\u9fff]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function thumbnailDedupeKey(url){
  if(!url) return '';
  const m = String(url).match(/\/vi\/([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : String(url).split('?')[0];
}

/** Title-only fingerprint — Zee Music Company vs Zee Music South still match. */
function similarVideoKey(v){
  const titleKey = normalizeTitleDedupeKey(v.title);
  const tokens = titleKey.split(' ').filter(w => w.length > 1);
  if(tokens.length >= 2) return `t:${tokens.slice(0, 4).join(' ')}`;
  const thumb = thumbnailDedupeKey(v.thumbnail_url);
  if(thumb) return `i:${thumb}`;
  return `id:${v.video_id}`;
}

function dedupeSimilarVideos(rows){
  const seen = new Set();
  const out = [];
  for(const v of rows||[]){
    if(seen.has(v.video_id)) continue;
    const key = similarVideoKey(v);
    if(seen.has(key)) continue;
    seen.add(v.video_id);
    seen.add(key);
    out.push(v);
  }
  return out;
}

// Category view: if the same video spans multiple categories, use the category where it has the highest rank as its representative
let categoryOwnerCache = { snapshotId:null, owner:null };

async function buildCategoryOwners(){
  if(categoryOwnerCache.snapshotId === latestSnapshot.id) return categoryOwnerCache.owner;
  // Exclude 'all'; fetch (video, category, rank) for every category row
  const { data } = await sb.from('scout_videos')
    .select('video_id,category_key,rank')
    .eq('snapshot_id', latestSnapshot.id)
    .neq('category_key','all');
  // For each video, use the category with the "highest rank (lower number = higher rank)" as its representative
  const best = {}; // video_id -> {cat, rank}
  (data||[]).forEach(r=>{
    const cur = best[r.video_id];
    if(!cur || r.rank < cur.rank){ best[r.video_id] = { cat:r.category_key, rank:r.rank }; }
  });
  const owner = {};
  Object.entries(best).forEach(([vid,info])=>{ owner[vid] = info.cat; });
  categoryOwnerCache = { snapshotId:latestSnapshot.id, owner };
  return owner;
}

async function loadCategoryVideos(categoryKey, limit){
  const owner = await buildCategoryOwners();
  const { data, error } = await sb.from('scout_videos').select('*')
    .eq('snapshot_id', latestSnapshot.id).eq('category_key', categoryKey)
    .order('view_count',{ascending:false}).limit(800);
  if(error){ console.error(error); return []; }
  const seen=new Set(); const out=[];
  for(const v of (data||[])){
    if(seen.has(v.video_id)) continue;                          // Remove duplicate videos
    if(owner[v.video_id] && owner[v.video_id]!==categoryKey) continue; // Skip if not the representative category
    seen.add(v.video_id); out.push(v);
    if(out.length>=limit) break;
  }
  return out;
}

const reactionsCache = new Map();
let reactionsInflight = 0;
let reactionsApiOk = null;
const REACTIONS_MAX_PARALLEL = 4;

async function fetchVideoReactions(videoId){
  if(reactionsCache.has(videoId)) return reactionsCache.get(videoId);
  const url = window.HUMATECK_CONFIG.VIDEO_REACTIONS_URL
    || `${window.HUMATECK_CONFIG.SUPABASE_URL}/functions/v1/video-reactions`;
  while(reactionsInflight >= REACTIONS_MAX_PARALLEL){
    await new Promise(r=>setTimeout(r, 120));
  }
  reactionsInflight++;
  try{
    const res = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey': SUPABASE_ANON_KEY
      },
      body:JSON.stringify({ videoId }), cache:'no-store'
    });
    const data = await res.json();
    if(data?.error === 'YouTube API not configured') reactionsApiOk = false;
    else if(data?.ok) reactionsApiOk = true;
    reactionsCache.set(videoId, data);
    return data;
  }catch(e){
    return { ok:false, error:'Could not load reactions' };
  }finally{
    reactionsInflight--;
  }
}

function bindVideoReactions(root){
  if(!root) return;
  const boxes = [...root.querySelectorAll('.videoReactions[data-video-id]')];
  if(!boxes.length) return;

  // Auto-load first cards so the コメントを見る button is ready when scrolled in.
  boxes.slice(0, 24).forEach(loadReactionBox);
  if(boxes.length > 24){
    const observer = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(!entry.isIntersecting) return;
        observer.unobserve(entry.target);
        loadReactionBox(entry.target);
      });
    }, { rootMargin:'500px' });
    boxes.slice(24).forEach(el=>observer.observe(el));
  }

  root.addEventListener('click', (e)=>{
    const btn = e.target.closest('[data-action="toggle-comments"]');
    if(!btn || !root.contains(btn)) return;
    e.preventDefault();
    e.stopPropagation();
    const box = btn.closest('.videoReactions');
    const panel = box && box.querySelector('[data-role="comments-panel"]');
    if(!panel) return;
    const open = panel.classList.toggle('open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    const count = panel.querySelectorAll('.commentList li').length;
    btn.textContent = open ? `Hide comments (${count})` : `View comments (${count})`;
    if(open) notifyParentResize();
  });
}

function measureFrameHeight(){
  const shell = document.querySelector('.scouterShell');
  if(!shell) return 800;
  const body = document.body;
  const cs = getComputedStyle(body);
  const pad = (parseFloat(cs.paddingTop)||0) + (parseFloat(cs.paddingBottom)||0);
  return shell.offsetHeight + pad + 24;
}

function notifyParentResize(){
  try{
    const h = measureFrameHeight();
    if(window.parent && window.parent !== window){
      if(window.parent.fitToolFrame) window.parent.fitToolFrame();
      window.parent.postMessage({type:'scouter-height', height:h}, '*');
    }
  }catch(e){}
}

function watchFrameHeight(){
  notifyParentResize();
  if(typeof ResizeObserver !== 'undefined'){
    const ro = new ResizeObserver(()=>notifyParentResize());
    const shell = document.querySelector('.scouterShell');
    const content = document.getElementById('content');
    if(shell) ro.observe(shell);
    if(content) ro.observe(content);
    ro.observe(document.body);
  }
  const content = document.getElementById('content');
  if(content && typeof MutationObserver !== 'undefined'){
    const mo = new MutationObserver(()=>{
      notifyParentResize();
      setTimeout(notifyParentResize, 120);
    });
    mo.observe(content, {childList:true, subtree:true});
  }
  window.addEventListener('load', notifyParentResize, true);
  [200, 600, 1500, 3000, 6000].forEach(ms=>setTimeout(notifyParentResize, ms));
}

async function runYtSearchRequest({ format, q, periodDays }){
  const label = format === 'shorts' ? '쇼츠' : '롱폼';
  const periodLabel = periodDays >= 365 ? '1년' : periodDays >= 30 ? '30일' : periodDays >= 7 ? '7일' : '';
  const url = window.HUMATECK_CONFIG.JP_SEARCH_URL
    || `${SUPABASE_URL}/functions/v1/jp-search`;
  const expect = YT_SEARCH_UNITS;
  setSearchApiNote(
    periodDays
      ? `${label} ${periodLabel} 기간검색 중… (예상 <b>${expect} units</b>)`
      : `${label} YouTube 검색 중… (예상 <b>${expect} units</b>)`
  );
  const content = $('#content');
  content.innerHTML = `<div class="state"><div class="spin"></div><div>${label}${periodLabel?` ${periodLabel}`:''} 검색 중…</div></div>`;
  try{
    const body = { pin: ACCESS_PIN, format, maxResults: 25 };
    if(q) body.q = q;
    if(periodDays > 0) body.periodDays = periodDays;
    const res = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'x-scouter-pin': ACCESS_PIN
      },
      body: JSON.stringify(body),
      cache:'no-store'
    });
    const data = await res.json();
    if(!res.ok || !data.ok){
      content.innerHTML = `<div class="state">검색 실패: ${escapeHtml(data.error||res.statusText)}</div>`;
      setSearchApiNote(`실패 · units ~100일 수 있음. ${escapeHtml(data.error||'')}`);
      return;
    }
    const units = data.apiUnits || expect;
    setSearchApiNote(
      `<span class="searchApiUsed">소모: 약 ${units} units</span> · ${escapeHtml(data.apiNote||'')} · 결과 ${(data.results||[]).length}건`
    );
    lastVideoRows = data.results || [];
    lastVideoCardFn = cardHTML;
    lastVideoSectitle = periodDays
      ? `${label} · ${periodLabel} YouTube 기간`
      : `${label} YouTube 검색 · ${q}`;
    await renderRichVideoPage({
      rows: lastVideoRows,
      cardFn: cardHTML,
      sectitle: lastVideoSectitle,
      countText: `${lastVideoRows.length} · API ${units}u`,
      skipCache: true
    });
  }catch(e){

    setSearchApiNote('네트워크 오류');
  }
}

// Rising: compares the latest snapshot with the snapshot closest to N days ago, ranked by view-count increase
async function loadRising(periodDays){
  // Fetch enough snapshots, newest first
  const { data: snaps } = await sb.from('scout_snapshots')
    .select('*').eq('kind', kindForView('rising', state.risingFormat)).order('collected_at',{ascending:false}).limit(40);
  if(!snaps || snaps.length < 2){
    return { notReady:true, reason:'firstrun' };
  }
  const cur = snaps[0];
  const curTime = new Date(cur.collected_at).getTime();
  const targetTime = curTime - periodDays*86400000;

  // Find the 'previous' snapshot closest to the target time (N days ago)
  let prev = null, bestGap = Infinity;
  for(let i=1;i<snaps.length;i++){
    const t = new Date(snaps[i].collected_at).getTime();
    if(t > curTime) continue;
    const gap = Math.abs(t - targetTime);
    if(gap < bestGap){ bestGap = gap; prev = snaps[i]; }
  }
  // If the comparison snapshot hasn't even reached half the target period, treat it as "not enough data yet"
  const spanDays = prev ? (curTime - new Date(prev.collected_at).getTime())/86400000 : 0;
  if(!prev || spanDays < periodDays*0.5){
    return { notReady:true, reason:'notenough', haveDays: Math.round(spanDays), needDays: periodDays };
  }

  const { data: curV } = await sb.from('scout_videos').select('video_id,title,channel,thumbnail_url,view_count,like_count,comment_count,published_at,country_code,youtube_url')
    .eq('snapshot_id', cur.id).eq('category_key','all').eq('country_code','JP');
  const { data: prevV } = await sb.from('scout_videos').select('video_id,view_count')
    .eq('snapshot_id', prev.id).eq('category_key','all').eq('country_code','JP');

  const prevMap = {};
  (prevV||[]).forEach(v=>{ if(prevMap[v.video_id]==null || v.view_count>prevMap[v.video_id]) prevMap[v.video_id]=v.view_count; });

  const best = {};
  (curV||[]).forEach(v=>{
    const before = prevMap[v.video_id];
    if(before==null) return;
    const delta = (v.view_count||0) - before;
    if(!best[v.video_id] || v.view_count>best[v.video_id].view_count){
      best[v.video_id] = {...v, delta};
    }
  });
  const rows = Object.values(best).filter(v=>v.delta>0).sort((a,b)=>b.delta-a.delta).slice(0,60);
  return { notReady:false, rows, spanDays:Math.round(spanDays) };
}

// Engagement: (likes + comments) / views, only for videos with 10,000+ views (to avoid skewed ratios)
async function loadEngagement(){
  if(!latestSnapshot) return [];
  // Fetch from the per-country 'all' set, deduplicate, then compute engagement
  const { data, error } = await sb.from('scout_videos').select('*')
    .eq('snapshot_id', latestSnapshot.id).eq('category_key','all').neq('country_code','GLOBAL')
    .gte('view_count', 10000)
    .limit(800);
  if(error){ console.error(error); return []; }
  const seen=new Set(); const rows=[];
  for(const v of (data||[])){
    if(seen.has(v.video_id)) continue;
    seen.add(v.video_id);
    const eng = ((v.like_count||0) + (v.comment_count||0)) / Math.max(1, v.view_count||1);
    rows.push({...v, engagement: eng});
  }
  rows.sort((a,b)=> b.engagement - a.engagement);
  return rows.slice(0,60);
}

// ===== Keyword Trends =====
// Words to filter out (stopwords): meaningless common/boilerplate words (multilingual)
const STOPWORDS = new Set([
  // Common English
  "the","a","an","of","to","in","on","for","and","or","with","by","at","from","is","are","be","my","your","you","i","it","we","this","that","new","official","video","mv","feat","ft","full","hd","4k","vs","x","ep","part","season","live","audio","lyrics","lyric","music","song","remix","cover","trailer","teaser","show","tv","ver","version","prod",
  // Common Korean
  "そして","でも","しかし","今日","公式","動画","最新","本当","これ","それ","feat",
  // Symbols/numeric
  "|","-","–","—","ft.","feat.","x","&","·",
  // Common Japanese/other boilerplate words
  "公式","ミュージック","ビデオ","初","オフィシャル"
]);

// Split a title into words (Korean/English/Japanese/numeric, 2+ characters)
function tokenize(title){
  if(!title) return [];
  // Include content inside parentheses/brackets; treat special characters as spaces
  const cleaned = title.toLowerCase()
    .replace(/[\[\]\(\)\{\}|.,!?:;"'`~@#$%^&*+=<>/\\]/g," ")
    .replace(/[-–—_]/g," ");
  const raw = cleaned.split(/\s+/).filter(Boolean);
  const out = [];
  for(let w of raw){
    w = w.trim();
    if(w.length < 2) continue;            // Exclude single characters
    if(/^\d+$/.test(w)) continue;          // Exclude pure numbers
    if(STOPWORDS.has(w)) continue;         // Exclude stopwords
    out.push(w);
  }
  return out;
}

// Popular keywords: tally word frequency across titles in the latest snapshot's 'all' (per-country) set
async function loadKeywordsPopular(){
  await ensureSnapshotForView();
  if(!latestSnapshot) return [];
  const { data } = await sb.from('scout_videos').select('video_id,title')
    .eq('snapshot_id', latestSnapshot.id).eq('category_key','all').eq('country_code','JP')
    .limit(800);
  const seen=new Set(); const titles=[];
  (data||[]).forEach(r=>{ if(!seen.has(r.video_id)){ seen.add(r.video_id); titles.push(r.title); } });
  const freq = {};
  titles.forEach(t=> tokenize(t).forEach(w=>{ freq[w]=(freq[w]||0)+1; }));
  return Object.entries(freq)
    .filter(([w,n])=> n>=2)              // 2+ occurrences only
    .sort((a,b)=> b[1]-a[1])
    .slice(0,40)
    .map(([word,count])=>({word,count}));
}

// Rising keywords: word frequency increase between the latest snapshot and the previous one
async function loadKeywordsSurge(){
  const kind = kindForView('keyword', state.risingFormat);
  const { data: snaps } = await sb.from('scout_snapshots')
    .select('*').eq('kind', kind).order('collected_at',{ascending:false}).limit(2);
  if(!snaps || snaps.length < 2) return { notReady:true };
  const freqOf = async (snapId)=>{
    const { data } = await sb.from('scout_videos').select('video_id,title')
      .eq('snapshot_id', snapId).eq('category_key','all').eq('country_code','JP').limit(800);
    const seen=new Set(); const f={};
    (data||[]).forEach(r=>{ if(!seen.has(r.video_id)){ seen.add(r.video_id); tokenize(r.title).forEach(w=>{ f[w]=(f[w]||0)+1; }); } });
    return f;
  };
  const cur = await freqOf(snaps[0].id);
  const prev = await freqOf(snaps[1].id);
  const rows = [];
  Object.entries(cur).forEach(([w,n])=>{
    const before = prev[w]||0;
    const delta = n - before;
    if(delta>0 && n>=2) rows.push({word:w, count:n, delta});
  });
  rows.sort((a,b)=> b.delta-a.delta);
  return { notReady:false, rows: rows.slice(0,40) };
}

// Keyword list HTML (copy-all button + click-to-copy for each keyword)
function keywordListHTML(items, isSurge){
  const bar = `<div class="kwbar">
    <button class="copyall" id="copyAllBtn">キーワードをすべてコピー</button>
    <span class="kwtip">キーワードをクリックで個別コピー</span>
  </div>`;
  const grid = `<div class="kwgrid">${items.map((k,i)=>
    `<div class="kw" data-word="${escapeHtml(k.word)}">
      <span class="rk">${i+1}</span>
      <span class="word">${escapeHtml(k.word)}</span>
      ${isSurge?`<span class="up">▲ ${k.delta}</span>`:''}
      <span class="cnt">${k.count}${isSurge?' occurrences':' videos'}</span>
      <span class="copyhint">コピー</span>
    </div>`
  ).join('')}</div>`;
  return bar + grid;
}

async function copyText(text){
  try { await navigator.clipboard.writeText(text); return true; }
  catch(e){
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); document.body.removeChild(ta); return true; }
    catch(e2){ document.body.removeChild(ta); return false; }
  }
}

function bindKeywordコピー(words){
  // Click-to-copy for each keyword
  document.querySelectorAll('.kw').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const w = el.dataset.word;
      const ok = await copyText(w);
      if(ok){
        el.classList.add('copied');
        const hint = el.querySelector('.copyhint');
        if(hint) hint.textContent = 'Copied!';
        setTimeout(()=>{ el.classList.remove('copied'); if(hint) hint.textContent='コピー'; }, 1200);
      }
    });
  });
  // コピー all
  const btn = document.getElementById('copyAllBtn');
  if(btn){
    btn.addEventListener('click', async ()=>{
      const ok = await copyText(words.join(', '));
      if(ok){
        btn.classList.add('done');
        const orig = btn.textContent;
        btn.textContent = `${words.length} 件コピーしました`;
        setTimeout(()=>{ btn.classList.remove('done'); btn.textContent = orig; }, 1500);
      }
    });
  }
}

  await renderRichVideoPage({

async function authLogin(){
  setAuthMessage('','');
  const pin = (document.getElementById('authPin')?.value || '').trim();
  if(!/^\d{4}$/.test(pin)){ setAuthMessage('4자리 숫자 PIN을 입력하세요'); return; }
  if(!ACCESS_PIN){ setAuthMessage('ACCESS_PIN이 설정되지 않았습니다'); return; }
  if(pin !== ACCESS_PIN){ setAuthMessage('PIN이 틀렸습니다'); return; }
  showLoggedIn();
  await bootScouter();
}

async function authLogout(){
  showLoggedOut();
  setAuthMessage('','나갔습니다');
}

function bindAuthUi(){
  document.getElementById('authLoginBtn')?.addEventListener('click', authLogin);
  document.getElementById('authLogoutBtn')?.addEventListener('click', authLogout);
  document.getElementById('authPin')?.addEventListener('keydown', (ev)=>{
    if(ev.key === 'Enter') authLogin();
  });
  bindSearchUi();
}


async function bootScouter(){
  if(window.self !== window.top) document.documentElement.classList.add('in-iframe');
  latestSnapshot = await loadLatestSnapshot(KIND_LONG);
  if(latestSnapshot){
    trackedSnapshotId = latestSnapshot.id;
    updateRefreshLabels();
    setInterval(updateRefreshLabels, 1000);
    setInterval(pollForFreshSnapshot, 60000);
  } else {
    $('#content').innerHTML = `<div class="state">일본 데이터가 아직 없습니다.<br>GitHub Actions의 <b>Japan Daily Scout Collect</b> 또는 <b>node fetch.mjs</b>를 먼저 실행하세요.</div>`;
  }
  watchFrameHeight();
  renderChips();
  render();
}

// Init — PIN 필수
(async ()=>{
  bindAuthUi();
  let unlocked = false;
  try{ unlocked = sessionStorage.getItem(PIN_STORAGE_KEY) === '1'; }catch(_){}
  if(!unlocked){
    showLoggedOut();
    return;
  }
  showLoggedIn();
  await bootScouter();
})();
</script>
